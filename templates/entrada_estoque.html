<!DOCTYPE html>
<html>
<head>
    <title>Entrada de Estoque</title>
</head>
<body>

<h2>Entrada de Livro</h2>

<p>{{ message }}</p>

<form method="POST">

    <label>Título</label>
    <br>
    <input type="text" name="titulo">
    <br><br>

    <label>Autor</label>
    <br>
    <input type="text" name="autor">
    <br><br>

    <label>Tema</label>
    <br>
    <input type="text" name="tema">
    <br><br>

    <label>Preço de compra</label>
    <br>
    <input type="number" step="0.01" name="preco">
    <br><br>

    <label>Quantidade</label>
    <br>
    <input type="number" name="quantidade">
    <br><br>

    <label>Prateleira</label>
    <br>
    <select name="id_prateleira">

        {% for prateleira in prateleiras %}

        <option value="{{ prateleira.id }}">
            {{ prateleira.codigo}} - {{ prateleira.descricao }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <button type="submit">
        Registrar Entrada
    </button>

</form>

</body>
</html>
