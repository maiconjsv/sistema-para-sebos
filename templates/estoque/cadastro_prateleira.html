<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de patreleira</title>
</head>
<body>
    <h1>Cadastro de prateleira</h1>

    <p>{{ message }}</p>
    <form method="post">
        
        <label for="codigo">Código</label>
        <br>
        <input type="text" name="codigo">
        <br><br>

        <label for="descricao">Descição</label>
        <br>
        <input type="text" name="descricao">
        <br><br>

    <label>Setor</label>
    <br>
    <select name="id_setor">

    {% for setor in setores %}

    <option value="{{ setor.id }}">
        {{ setor.nome }} - {{ setor.descricao }}
    </option>

    {% endfor %}

    </select>
        <br><br>

        <button type="submit">Salvar</button>
    </form>
</body>
</html>
