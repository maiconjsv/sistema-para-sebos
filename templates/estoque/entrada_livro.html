<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../static/css/estoque.css">
    <title>Entrada de livros</title>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar_click">
            <h3>BookCase</h3> 
            <img src="../../static/media/arrow_open.svg" alt="" class="btn_sidebar_control">
        </div>
        <a href="/produtos">Listar livros</a>
        <a href="/cadastro_prateleira">Entrada prateleira</a>
        <a href="/cadastro_classificacao">cadastro_classificacao</a>
        <a href="/cadastro_setor">cadastro_setor</a>
        <a href="/entrada_outros">entrada_outros</a>
    </div>
    

<main>
    <div class="main_dashboard">
        <h2>Entrada de Livros</h2>
        
        <p>{{ message }}</p>
        
        <form method="POST" class="main_form">

            <label>Título</label>

            <input type="text" name="titulo">

            <label>Autor</label>

            <input type="text" name="autor">

            <label>Tema</label>

            <input type="text" name="tema">
        
            <label>Preço de compra</label>

            <input type="number" step="0.01" name="preco">
        
            <label>Quantidade</label>
            
            <input type="number" name="quantidade">
        
            <label>Prateleira</label>

            <select name="id_prateleira">
        
                {% for prateleira in prateleiras %}
        
                <option value="{{ prateleira.id }}">
                    {{ prateleira.codigo}} - {{ prateleira.descricao }}
                </option>
        
                {% endfor %}
        
            </select>
        
            <button type="submit">
                Registrar Entrada
            </button>
        
        </form>
    </div>
</main>

<script src="../../static/js/estoque.js" type="module"></script>
</body>
</html>
